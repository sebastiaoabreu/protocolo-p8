<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 210" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <filter id="sh9" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect x="2" y="2" width="596" height="206" rx="10" fill="#fff" stroke="#dc2626" stroke-width="3" filter="url(#sh9)"/>

  <!-- Header -->
  <rect x="2" y="2" width="596" height="38" rx="10" fill="#dc2626"/>
  <rect x="2" y="30" width="596" height="10" fill="#dc2626"/>
  <text x="300" y="27" text-anchor="middle" font-size="13" font-weight="800" fill="#fff">⚠ OBRIGATÓRIO COM DCA — Tiamina (Vitamina B1)</text>

  <!-- Main dose -->
  <rect x="130" y="52" width="340" height="32" rx="6" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="300" y="73" text-anchor="middle" font-size="14" font-weight="800" fill="#991b1b">300–500 mg/dia É OBRIGATÓRIA</text>

  <!-- Why -->
  <text x="30" y="106" font-size="12" font-weight="700" fill="#1e293b">Por quê?</text>
  <text x="95" y="106" font-size="12" fill="#374151">DCA depleta tiamina. Sem ela, ocorre:</text>

  <circle cx="45" cy="128" r="4" fill="#dc2626"/>
  <text x="58" y="132" font-size="11" fill="#374151">Neuropatia periférica (dor, formigamento, fraqueza)</text>

  <circle cx="45" cy="150" r="4" fill="#dc2626"/>
  <text x="58" y="154" font-size="11" fill="#374151">Encefalopatia de Wernicke</text>

  <circle cx="45" cy="172" r="4" fill="#dc2626"/>
  <text x="58" y="176" font-size="11" fill="#374151">Dano potencialmente <tspan font-weight="700">irreversível</tspan></text>

  <!-- Also recommended -->
  <line x1="320" y1="115" x2="320" y2="185" stroke="#e2e8f0" stroke-width="1"/>
  <text x="340" y="118" font-size="10" font-weight="700" fill="#475569">TAMBÉM RECOMENDADO:</text>
  <text x="340" y="140" font-size="10" fill="#374151">• Ácido alfa-lipóico: 600mg/dia</text>
  <text x="352" y="154" font-size="9" fill="#6b7280">(neuroproteção)</text>
  <text x="340" y="175" font-size="10" fill="#374151">• Acetil-L-carnitina: 1-2g/dia</text>
  <text x="352" y="189" font-size="9" fill="#6b7280">(se não for Grupo Vermelho)</text>
</svg>
