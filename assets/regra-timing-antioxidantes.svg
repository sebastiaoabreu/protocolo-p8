<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 330" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <filter id="sh8" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect x="2" y="2" width="656" height="326" rx="10" fill="#fff" stroke="#f59e0b" stroke-width="2.5" filter="url(#sh8)"/>

  <!-- Header -->
  <rect x="2" y="2" width="656" height="42" rx="10" fill="#f59e0b"/>
  <rect x="2" y="32" width="656" height="12" fill="#f59e0b"/>
  <text x="330" y="28" text-anchor="middle" font-size="13" font-weight="800" fill="#fff">⚠ REGRA DE OURO DO TIMING — Paradoxo Oxidativo</text>

  <!-- Main instruction -->
  <rect x="20" y="54" width="620" height="32" rx="6" fill="#fef3c7"/>
  <text x="330" y="74" text-anchor="middle" font-size="12" font-weight="700" fill="#92400e">Suspenda antioxidantes potentes 12-24h ANTES de sessão pró-oxidante</text>
  <text x="330" y="100" text-anchor="middle" font-size="10" fill="#64748b">(Vit C IV, Hiperbárica, Artemisinina)</text>

  <!-- Reason -->
  <text x="330" y="120" text-anchor="middle" font-size="10" font-style="italic" fill="#78716c">Antioxidantes podem "apagar o fogo" que queremos gerar DENTRO do tumor</text>

  <!-- Two columns -->
  <!-- SUSPENDER -->
  <rect x="25" y="138" width="295" height="140" rx="8" fill="#fef2f2" stroke="#fecaca" stroke-width="1"/>
  <rect x="25" y="138" width="295" height="28" rx="8" fill="#ef4444"/>
  <rect x="25" y="158" width="295" height="8" fill="#ef4444"/>
  <text x="172" y="158" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">SUSPENDER antes da sessão</text>
  <text x="45" y="185" font-size="11" fill="#374151">✕  NAC</text>
  <text x="45" y="203" font-size="11" fill="#374151">✕  Vitamina C oral (dose alta)</text>
  <text x="45" y="221" font-size="11" fill="#374151">✕  Vitamina E</text>
  <text x="45" y="239" font-size="11" fill="#374151">✕  Glutationa</text>
  <text x="45" y="257" font-size="11" fill="#374151">✕  Alpha-ácido lipóico</text>

  <!-- PODE MANTER -->
  <rect x="340" y="138" width="295" height="140" rx="8" fill="#dcfce7" stroke="#bbf7d0" stroke-width="1"/>
  <rect x="340" y="138" width="295" height="28" rx="8" fill="#16a34a"/>
  <rect x="340" y="158" width="295" height="8" fill="#16a34a"/>
  <text x="487" y="158" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">PODE MANTER</text>
  <text x="360" y="185" font-size="11" fill="#374151">✓  Curcumina (efeitos pró-oxidantes)</text>
  <text x="360" y="203" font-size="11" fill="#374151">✓  EGCG (dose baixa)</text>
  <text x="360" y="221" font-size="11" fill="#374151">✓  Selênio (dose baixa)</text>

  <!-- Retomar -->
  <rect x="150" y="290" width="360" height="28" rx="14" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="330" y="308" text-anchor="middle" font-size="11" font-weight="700" fill="#1e40af">RETOMAR: 6-12h após a sessão pró-oxidante</text>
</svg>
