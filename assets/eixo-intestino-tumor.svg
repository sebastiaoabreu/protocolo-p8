<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 340" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <filter id="sh3" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="750" height="340" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="375" y="30" text-anchor="middle" font-size="15" font-weight="700" fill="#1e293b">O Eixo Intestino–Tumor (Comunicação Bidirecional)</text>

  <!-- Intestino box -->
  <rect x="30" y="55" width="175" height="230" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="2" filter="url(#sh3)"/>
  <text x="117" y="82" text-anchor="middle" font-size="15" font-weight="700" fill="#1e40af">INTESTINO</text>
  <line x1="55" y1="90" x2="180" y2="90" stroke="#93c5fd" stroke-width="1"/>
  <text x="117" y="110" text-anchor="middle" font-size="10" fill="#3b82f6">Quartel-General</text>
  <text x="117" y="124" text-anchor="middle" font-size="10" fill="#3b82f6">Imunológico</text>
  <text x="117" y="150" text-anchor="middle" font-size="10" fill="#64748b">70-80% do</text>
  <text x="117" y="164" text-anchor="middle" font-size="10" fill="#64748b">sistema imune</text>
  <text x="117" y="190" text-anchor="middle" font-size="10" fill="#64748b">100 trilhões de</text>
  <text x="117" y="204" text-anchor="middle" font-size="10" fill="#64748b">microrganismos</text>
  <text x="117" y="230" text-anchor="middle" font-size="10" fill="#64748b">Produz TMAO*,</text>
  <text x="117" y="244" text-anchor="middle" font-size="10" fill="#64748b">Butirato, Urolitinas</text>

  <!-- Tumor box -->
  <rect x="545" y="55" width="175" height="230" rx="10" fill="#fef2f2" stroke="#dc2626" stroke-width="2" filter="url(#sh3)"/>
  <text x="632" y="82" text-anchor="middle" font-size="15" font-weight="700" fill="#991b1b">TUMOR</text>
  <line x1="570" y1="90" x2="695" y2="90" stroke="#fca5a5" stroke-width="1"/>
  <text x="632" y="110" text-anchor="middle" font-size="10" fill="#dc2626">Alvo do Ataque</text>
  <text x="632" y="145" text-anchor="middle" font-size="10" fill="#64748b">Microambiente</text>
  <text x="632" y="159" text-anchor="middle" font-size="10" fill="#64748b">modulado pelo</text>
  <text x="632" y="173" text-anchor="middle" font-size="10" fill="#64748b">intestino</text>
  <text x="632" y="208" text-anchor="middle" font-size="10" fill="#64748b">Crescimento,</text>
  <text x="632" y="222" text-anchor="middle" font-size="10" fill="#64748b">evasão imune e</text>
  <text x="632" y="236" text-anchor="middle" font-size="10" fill="#64748b">metástase</text>

  <!-- Forward arrows (Intestino → Tumor) -->
  <!-- Arrow 1: Metabólitos -->
  <line x1="205" y1="105" x2="535" y2="105" stroke="#2563eb" stroke-width="1.8"/>
  <polygon points="535,105 525,100 525,110" fill="#2563eb"/>
  <rect x="305" y="92" width="140" height="22" rx="6" fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>
  <text x="375" y="107" text-anchor="middle" font-size="11" font-weight="600" fill="#1e40af">Metabólitos</text>
  <text x="375" y="127" text-anchor="middle" font-size="9" fill="#6b7280">Modulam crescimento</text>

  <!-- Arrow 2: Citocinas -->
  <line x1="205" y1="160" x2="535" y2="160" stroke="#2563eb" stroke-width="1.8"/>
  <polygon points="535,160 525,155 525,165" fill="#2563eb"/>
  <rect x="305" y="147" width="140" height="22" rx="6" fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>
  <text x="375" y="162" text-anchor="middle" font-size="11" font-weight="600" fill="#1e40af">Citocinas</text>
  <text x="375" y="182" text-anchor="middle" font-size="9" fill="#6b7280">Afetam microambiente</text>

  <!-- Arrow 3: Células imunes -->
  <line x1="205" y1="215" x2="535" y2="215" stroke="#2563eb" stroke-width="1.8"/>
  <polygon points="535,215 525,210 525,220" fill="#2563eb"/>
  <rect x="305" y="202" width="140" height="22" rx="6" fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>
  <text x="375" y="217" text-anchor="middle" font-size="11" font-weight="600" fill="#1e40af">Células imunes</text>
  <text x="375" y="237" text-anchor="middle" font-size="9" fill="#6b7280">Infiltram e atacam</text>

  <!-- Reverse arrow (Tumor → Intestino) -->
  <line x1="535" y1="265" x2="215" y2="265" stroke="#dc2626" stroke-width="1.8" stroke-dasharray="6,3"/>
  <polygon points="215,265 225,260 225,270" fill="#dc2626"/>
  <rect x="305" y="252" width="140" height="22" rx="6" fill="#fecaca" stroke="#fca5a5" stroke-width="1"/>
  <text x="375" y="267" text-anchor="middle" font-size="11" font-weight="600" fill="#991b1b">Fatores tumorais</text>
  <text x="375" y="287" text-anchor="middle" font-size="9" fill="#6b7280">Alteram microbiota</text>

  <!-- Bottom note -->
  <text x="375" y="320" text-anchor="middle" font-size="11" font-weight="600" fill="#475569">Por isso tratamos o intestino para curar o câncer.</text>
</svg>
