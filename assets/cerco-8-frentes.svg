<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 720" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <filter id="shadow1" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.15"/>
    </filter>
    <linearGradient id="targetGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dc2626"/>
      <stop offset="100%" stop-color="#991b1b"/>
    </linearGradient>
    <linearGradient id="resultGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#16a34a"/>
      <stop offset="100%" stop-color="#15803d"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="820" height="720" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Title -->
  <text x="410" y="35" text-anchor="middle" font-size="16" font-weight="700" fill="#1e293b">O Cerco Metabólico: 8 Frentes de Ataque Simultâneo</text>

  <!-- Target cell -->
  <rect x="310" y="52" width="200" height="42" rx="8" fill="url(#targetGrad)" filter="url(#shadow1)"/>
  <text x="410" y="72" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">🎯 CÉLULA TUMORAL 🎯</text>
  <text x="410" y="86" text-anchor="middle" font-size="9" fill="#fecaca">(Alvo do cerco)</text>

  <!-- Connector lines from target to row 1 -->
  <line x1="410" y1="94" x2="410" y2="110" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="140" y1="110" x2="680" y2="110" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="140" y1="110" x2="140" y2="125" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="410" y1="110" x2="410" y2="125" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="680" y1="110" x2="680" y2="125" stroke="#94a3b8" stroke-width="1.5"/>
  <!-- Arrowheads row 1 -->
  <polygon points="140,125 135,118 145,118" fill="#94a3b8"/>
  <polygon points="410,125 405,118 415,118" fill="#94a3b8"/>
  <polygon points="680,125 675,118 685,118" fill="#94a3b8"/>

  <!-- ROW 1 -->
  <!-- Box 1: Cetose -->
  <rect x="40" y="128" width="200" height="100" rx="8" fill="#fff" stroke="#3b82f6" stroke-width="2" filter="url(#shadow1)"/>
  <rect x="40" y="128" width="200" height="28" rx="8" fill="#3b82f6"/>
  <rect x="40" y="148" width="200" height="8" fill="#3b82f6"/>
  <text x="140" y="148" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">1. CETOSE</text>
  <text x="140" y="173" text-anchor="middle" font-size="11" fill="#374151">Corta glicose</text>
  <text x="140" y="190" text-anchor="middle" font-size="10" fill="#6b7280">(porta principal)</text>
  <text x="140" y="218" text-anchor="middle" font-size="9" fill="#9ca3af">Dieta cetogênica estrita</text>

  <!-- Box 2: Jejum -->
  <rect x="310" y="128" width="200" height="100" rx="8" fill="#fff" stroke="#3b82f6" stroke-width="2" filter="url(#shadow1)"/>
  <rect x="310" y="128" width="200" height="28" rx="8" fill="#3b82f6"/>
  <rect x="310" y="148" width="200" height="8" fill="#3b82f6"/>
  <text x="410" y="148" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">2. JEJUM</text>
  <text x="410" y="173" text-anchor="middle" font-size="11" fill="#374151">Depleta reservas</text>
  <text x="410" y="190" text-anchor="middle" font-size="10" fill="#6b7280">+ ativa autofagia</text>
  <text x="410" y="218" text-anchor="middle" font-size="9" fill="#9ca3af">Intermitente e prolongado</text>

  <!-- Box 3: Anti-Glutamina -->
  <rect x="580" y="128" width="200" height="100" rx="8" fill="#fff" stroke="#3b82f6" stroke-width="2" filter="url(#shadow1)"/>
  <rect x="580" y="128" width="200" height="28" rx="8" fill="#3b82f6"/>
  <rect x="580" y="148" width="200" height="8" fill="#3b82f6"/>
  <text x="680" y="148" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">3. ANTI-GLUTAMINA</text>
  <text x="680" y="173" text-anchor="middle" font-size="11" fill="#374151">Fecha porta dos fundos</text>
  <text x="680" y="190" text-anchor="middle" font-size="10" fill="#6b7280">(via de escape)</text>
  <text x="680" y="218" text-anchor="middle" font-size="9" fill="#9ca3af">EGCG, Resveratrol, L-Teanina</text>

  <!-- Connector lines row 1 to row 2 -->
  <line x1="140" y1="228" x2="140" y2="248" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="410" y1="228" x2="410" y2="248" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="680" y1="228" x2="680" y2="248" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="140" y1="248" x2="680" y2="248" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="410" y1="248" x2="410" y2="265" stroke="#94a3b8" stroke-width="1.5"/>

  <!-- Split to row 2 -->
  <line x1="140" y1="265" x2="680" y2="265" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="140" y1="265" x2="140" y2="280" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="410" y1="265" x2="410" y2="280" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="680" y1="265" x2="680" y2="280" stroke="#94a3b8" stroke-width="1.5"/>
  <polygon points="140,280 135,273 145,273" fill="#94a3b8"/>
  <polygon points="410,280 405,273 415,273" fill="#94a3b8"/>
  <polygon points="680,280 675,273 685,273" fill="#94a3b8"/>

  <!-- ROW 2 -->
  <!-- Box 4: Microbiota -->
  <rect x="40" y="283" width="200" height="100" rx="8" fill="#fff" stroke="#8b5cf6" stroke-width="2" filter="url(#shadow1)"/>
  <rect x="40" y="283" width="200" height="28" rx="8" fill="#8b5cf6"/>
  <rect x="40" y="303" width="200" height="8" fill="#8b5cf6"/>
  <text x="140" y="303" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">4. MICROBIOTA</text>
  <text x="140" y="328" text-anchor="middle" font-size="11" fill="#374151">TMAO* eleva imunidade</text>
  <text x="140" y="345" text-anchor="middle" font-size="10" fill="#6b7280">Butirato mata tumor</text>
  <text x="140" y="373" text-anchor="middle" font-size="9" fill="#9ca3af">Modulação microbiana</text>

  <!-- Box 5: Cronobiologia -->
  <rect x="310" y="283" width="200" height="100" rx="8" fill="#fff" stroke="#8b5cf6" stroke-width="2" filter="url(#shadow1)"/>
  <rect x="310" y="283" width="200" height="28" rx="8" fill="#8b5cf6"/>
  <rect x="310" y="303" width="200" height="8" fill="#8b5cf6"/>
  <text x="410" y="303" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">5. CRONOBIOLOGIA</text>
  <text x="410" y="328" text-anchor="middle" font-size="11" fill="#374151">Timing otimizado</text>
  <text x="410" y="345" text-anchor="middle" font-size="10" fill="#6b7280">de tudo</text>
  <text x="410" y="373" text-anchor="middle" font-size="9" fill="#9ca3af">Ritmo circadiano como arma</text>

  <!-- Box 6: Ativação Vagal -->
  <rect x="580" y="283" width="200" height="100" rx="8" fill="#fff" stroke="#8b5cf6" stroke-width="2" filter="url(#shadow1)"/>
  <rect x="580" y="283" width="200" height="28" rx="8" fill="#8b5cf6"/>
  <rect x="580" y="303" width="200" height="8" fill="#8b5cf6"/>
  <text x="680" y="303" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">6. ATIVAÇÃO VAGAL</text>
  <text x="680" y="328" text-anchor="middle" font-size="11" fill="#374151">Desliga inflamação</text>
  <text x="680" y="345" text-anchor="middle" font-size="10" fill="#6b7280">crônica</text>
  <text x="680" y="373" text-anchor="middle" font-size="9" fill="#9ca3af">Neuro-imunidade</text>

  <!-- Connector lines row 2 to row 3 -->
  <line x1="140" y1="383" x2="140" y2="403" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="410" y1="383" x2="410" y2="403" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="680" y1="383" x2="680" y2="403" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="140" y1="403" x2="680" y2="403" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="410" y1="403" x2="410" y2="418" stroke="#94a3b8" stroke-width="1.5"/>

  <!-- Split to row 3 -->
  <line x1="140" y1="418" x2="680" y2="418" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="140" y1="418" x2="140" y2="435" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="410" y1="418" x2="410" y2="435" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="680" y1="418" x2="680" y2="435" stroke="#94a3b8" stroke-width="1.5"/>
  <polygon points="140,435 135,428 145,428" fill="#94a3b8"/>
  <polygon points="410,435 405,428 415,428" fill="#94a3b8"/>
  <polygon points="680,435 675,428 685,428" fill="#94a3b8"/>

  <!-- ROW 3 -->
  <!-- Box 7: Ferroptose -->
  <rect x="40" y="438" width="200" height="100" rx="8" fill="#fff" stroke="#f59e0b" stroke-width="2" filter="url(#shadow1)"/>
  <rect x="40" y="438" width="200" height="28" rx="8" fill="#f59e0b"/>
  <rect x="40" y="458" width="200" height="8" fill="#f59e0b"/>
  <text x="140" y="458" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">7. FERROPTOSE</text>
  <text x="140" y="483" text-anchor="middle" font-size="11" fill="#374151">Oxidação seletiva</text>
  <text x="140" y="500" text-anchor="middle" font-size="10" fill="#6b7280">do tumor</text>
  <text x="140" y="528" text-anchor="middle" font-size="9" fill="#9ca3af">Vitamina C IV</text>

  <!-- Box 8: Potencialização -->
  <rect x="310" y="438" width="200" height="100" rx="8" fill="#fff" stroke="#f59e0b" stroke-width="2" filter="url(#shadow1)"/>
  <rect x="310" y="438" width="200" height="28" rx="8" fill="#f59e0b"/>
  <rect x="310" y="458" width="200" height="8" fill="#f59e0b"/>
  <text x="410" y="458" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">8. POTENCIALIZAÇÃO</text>
  <text x="410" y="483" text-anchor="middle" font-size="11" fill="#374151">Quimio e imunoterapia</text>
  <text x="410" y="500" text-anchor="middle" font-size="10" fill="#6b7280">mais eficazes</text>
  <text x="410" y="528" text-anchor="middle" font-size="9" fill="#9ca3af">Sinergia com convencional</text>

  <!-- Box Result: Remissão -->
  <rect x="580" y="438" width="200" height="100" rx="8" fill="url(#resultGrad)" filter="url(#shadow1)"/>
  <text x="680" y="478" text-anchor="middle" font-size="15" font-weight="700" fill="#fff">RESULTADO</text>
  <text x="680" y="502" text-anchor="middle" font-size="18" font-weight="800" fill="#fff">REMISSÃO</text>

  <!-- All converge to result arrow -->
  <line x1="240" y1="538" x2="580" y2="488" stroke="#16a34a" stroke-width="2" stroke-dasharray="6,3"/>
  <line x1="510" y1="538" x2="580" y2="500" stroke="#16a34a" stroke-width="2" stroke-dasharray="6,3"/>

  <!-- Footnote -->
  <text x="410" y="575" text-anchor="middle" font-size="10" fill="#64748b" font-style="italic">*TMAO: Apenas para cânceres do GRUPO VERDE — ver Capítulo 3</text>

  <!-- Legend -->
  <rect x="180" y="598" width="460" height="95" rx="8" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="410" y="618" text-anchor="middle" font-size="10" font-weight="600" fill="#475569">LEGENDA DAS FRENTES</text>
  <rect x="205" y="628" width="12" height="12" rx="2" fill="#3b82f6"/>
  <text x="225" y="638" font-size="9" fill="#475569">Privação Metabólica (Frentes 1-3)</text>
  <rect x="430" y="628" width="12" height="12" rx="2" fill="#8b5cf6"/>
  <text x="450" y="638" font-size="9" fill="#475569">Modulação Biológica (Frentes 4-6)</text>
  <rect x="205" y="650" width="12" height="12" rx="2" fill="#f59e0b"/>
  <text x="225" y="660" font-size="9" fill="#475569">Ataque Direto e Sinergia (Frentes 7-8)</text>
  <rect x="430" y="650" width="12" height="12" rx="2" fill="#16a34a"/>
  <text x="450" y="660" font-size="9" fill="#475569">Objetivo Final</text>
  <text x="410" y="685" text-anchor="middle" font-size="9" fill="#94a3b8">O tumor não consegue escapar. O cerco é total.</text>
</svg>
