<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 180" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <filter id="shV" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="560" height="180" rx="10" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="280" y="25" text-anchor="middle" font-size="13" font-weight="700" fill="#1e293b">Protocolo Integrado de Ativação Vagal</text>

  <!-- Morning -->
  <rect x="20" y="40" width="250" height="120" rx="8" fill="#fff" stroke="#f59e0b" stroke-width="2" filter="url(#shV)"/>
  <rect x="20" y="40" width="250" height="28" rx="8" fill="#f59e0b"/>
  <rect x="20" y="60" width="250" height="8" fill="#f59e0b"/>
  <text x="145" y="60" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">☀ MANHÃ (ao acordar)</text>
  <text x="35" y="85" font-size="10" fill="#374151">• Respiração 4-7-8 (6 ciclos)</text>
  <text x="35" y="103" font-size="10" fill="#374151">• Exposição ao frio no rosto (30s)</text>
  <line x1="35" y1="115" x2="255" y2="115" stroke="#fde68a" stroke-width="1"/>
  <text x="145" y="133" text-anchor="middle" font-size="11" font-weight="700" fill="#92400e">Total: 5 minutos</text>
  <text x="145" y="150" text-anchor="middle" font-size="9" fill="#6b7280">Ativa parassimpático para o dia</text>

  <!-- Night -->
  <rect x="290" y="40" width="250" height="120" rx="8" fill="#fff" stroke="#6366f1" stroke-width="2" filter="url(#shV)"/>
  <rect x="290" y="40" width="250" height="28" rx="8" fill="#6366f1"/>
  <rect x="290" y="60" width="250" height="8" fill="#6366f1"/>
  <text x="415" y="60" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">🌙 NOITE (antes de dormir)</text>
  <text x="305" y="85" font-size="10" fill="#374151">• Cantarolar/Humming (5 min)</text>
  <text x="305" y="103" font-size="10" fill="#374151">• Respiração 4-7-8 (6 ciclos)</text>
  <line x1="305" y1="115" x2="525" y2="115" stroke="#c7d2fe" stroke-width="1"/>
  <text x="415" y="133" text-anchor="middle" font-size="11" font-weight="700" fill="#3730a3">Total: 8 minutos</text>
  <text x="415" y="150" text-anchor="middle" font-size="9" fill="#6b7280">Prepara para sono reparador</text>
</svg>
