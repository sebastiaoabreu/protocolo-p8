<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <filter id="shF1" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>

  <rect width="640" height="360" rx="12" fill="#fff" stroke="#334155" stroke-width="2"/>

  <!-- Header -->
  <rect x="0" y="0" width="640" height="50" rx="12" fill="#1e293b"/>
  <rect x="0" y="30" width="640" height="20" fill="#1e293b"/>
  <text x="320" y="34" text-anchor="middle" font-size="18" font-weight="800" fill="#fff">🚦 SISTEMA SEMÁFORO TMAO</text>

  <!-- GREEN -->
  <rect x="20" y="62" width="600" height="75" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2" filter="url(#shF1)"/>
  <circle cx="50" cy="100" r="18" fill="#16a34a"/>
  <text x="50" y="105" text-anchor="middle" font-size="14" font-weight="800" fill="#fff">V</text>
  <text x="80" y="84" font-size="13" font-weight="800" fill="#166534">GRUPO VERDE — ELEVAR TMAO (15-20 μM)</text>
  <text x="80" y="102" font-size="11" fill="#374151">Pâncreas, Melanoma, TNBC, Pulmão NSCLC, Glioblastoma</text>
  <text x="80" y="120" font-size="11" font-weight="600" fill="#16a34a">→ Colina 1-2g/dia + Carnitina 1-2g/dia</text>

  <!-- YELLOW -->
  <rect x="20" y="147" width="600" height="75" rx="8" fill="#fef9c3" stroke="#eab308" stroke-width="2" filter="url(#shF1)"/>
  <circle cx="50" cy="185" r="18" fill="#eab308"/>
  <text x="50" y="190" text-anchor="middle" font-size="14" font-weight="800" fill="#fff">A</text>
  <text x="80" y="169" font-size="13" font-weight="800" fill="#854d0e">GRUPO AMARELO — NEUTRO (5-10 μM)</text>
  <text x="80" y="187" font-size="11" fill="#374151">Mama (outros), Ovário, Bexiga, Esôfago, Estômago</text>
  <text x="80" y="205" font-size="11" font-weight="600" fill="#a16207">→ Sem suplementação de precursores, foco em cetose</text>

  <!-- RED -->
  <rect x="20" y="232" width="600" height="75" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="2" filter="url(#shF1)"/>
  <circle cx="50" cy="270" r="18" fill="#dc2626"/>
  <text x="50" y="275" text-anchor="middle" font-size="14" font-weight="800" fill="#fff">V</text>
  <text x="80" y="254" font-size="13" font-weight="800" fill="#991b1b">GRUPO VERMELHO — SUPRIMIR (&lt; 5 μM)</text>
  <text x="80" y="272" font-size="11" fill="#374151">Colorretal, Próstata, Fígado, Rim, Endométrio</text>
  <text x="80" y="290" font-size="11" font-weight="600" fill="#dc2626">→ ZERO Colina/Carnitina + Butirato 2-4g/dia</text>

  <!-- Footer note -->
  <rect x="120" y="320" width="400" height="28" rx="14" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1"/>
  <text x="320" y="339" text-anchor="middle" font-size="11" font-weight="600" fill="#475569">⚠ Câncer não listado? → Tratar como AMARELO</text>
</svg>
