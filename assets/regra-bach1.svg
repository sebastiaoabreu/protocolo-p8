<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 240" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <filter id="sh7" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Outer border -->
  <rect x="2" y="2" width="636" height="236" rx="10" fill="#fff" stroke="#dc2626" stroke-width="3" filter="url(#sh7)"/>

  <!-- Header -->
  <rect x="2" y="2" width="636" height="40" rx="10" fill="#dc2626"/>
  <rect x="2" y="30" width="636" height="12" fill="#dc2626"/>
  <text x="320" y="28" text-anchor="middle" font-size="14" font-weight="800" fill="#fff">⚠ REGRA DE SEGURANÇA BACH1 — OBRIGATÓRIA</text>

  <!-- Condition -->
  <text x="30" y="68" font-size="12" font-weight="700" fill="#1e293b">SE</text>
  <text x="55" y="68" font-size="12" fill="#374151">você tem CÂNCER DE MAMA (qualquer tipo, especialmente TNBC)</text>
  <text x="30" y="86" font-size="12" font-weight="700" fill="#1e293b">E</text>
  <text x="55" y="86" font-size="12" fill="#374151">está fazendo dieta cetogênica estrita (GKI &lt; 3.0)</text>

  <!-- Divider -->
  <line x1="30" y1="96" x2="610" y2="96" stroke="#fecaca" stroke-width="1"/>

  <!-- Action -->
  <text x="30" y="118" font-size="12" font-weight="700" fill="#dc2626">ENTÃO:</text>
  <text x="85" y="118" font-size="13" font-weight="700" fill="#991b1b">NAC (N-Acetilcisteína) é OBRIGATÓRIO</text>

  <!-- Details -->
  <circle cx="45" cy="142" r="4" fill="#dc2626"/>
  <text x="58" y="146" font-size="11" fill="#374151"><tspan font-weight="600">Dose:</tspan> 600mg a 1200mg, 2x ao dia</text>

  <circle cx="45" cy="166" r="4" fill="#dc2626"/>
  <text x="58" y="170" font-size="11" fill="#374151"><tspan font-weight="600">Por quê:</tspan> NAC inibe o estresse oxidativo que "gatilha" a via BACH1,</text>
  <text x="58" y="184" font-size="11" fill="#374151">anulando o sinal pró-metastático enquanto mantém a pressão no tumor primário</text>

  <!-- Warning footer -->
  <rect x="180" y="200" width="280" height="28" rx="14" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="320" y="219" text-anchor="middle" font-size="12" font-weight="800" fill="#dc2626">⚠ NÃO PULE ESTA REGRA</text>
</svg>
