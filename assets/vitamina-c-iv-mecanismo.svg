<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 200" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <filter id="sh6" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="680" height="200" rx="10" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="340" y="25" text-anchor="middle" font-size="13" font-weight="700" fill="#1e293b">Mecanismo Seletivo da Vitamina C Intravenosa</text>

  <!-- Start -->
  <rect x="230" y="40" width="220" height="32" rx="16" fill="#f59e0b" filter="url(#sh6)"/>
  <text x="340" y="61" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">Vitamina C IV → Gera H₂O₂ no sangue</text>

  <!-- Fork -->
  <line x1="340" y1="72" x2="340" y2="92" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="170" y1="92" x2="510" y2="92" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="170" y1="92" x2="170" y2="108" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="510" y1="92" x2="510" y2="108" stroke="#94a3b8" stroke-width="1.5"/>
  <polygon points="170,112 165,105 175,105" fill="#94a3b8"/>
  <polygon points="510,112 505,105 515,105" fill="#94a3b8"/>

  <!-- Normal cells path -->
  <rect x="50" y="114" width="240" height="32" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5" filter="url(#sh6)"/>
  <text x="170" y="134" text-anchor="middle" font-size="11" font-weight="600" fill="#166534">Células normais: Têm catalase</text>

  <line x1="170" y1="146" x2="170" y2="162" stroke="#16a34a" stroke-width="1.5"/>
  <polygon points="170,166 165,159 175,159" fill="#16a34a"/>

  <rect x="60" y="168" width="220" height="24" rx="12" fill="#16a34a"/>
  <text x="170" y="184" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">Neutralizam H₂O₂ → PROTEGIDAS</text>

  <!-- Tumor cells path -->
  <rect x="390" y="114" width="240" height="32" rx="6" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5" filter="url(#sh6)"/>
  <text x="510" y="134" text-anchor="middle" font-size="11" font-weight="600" fill="#991b1b">Células tumorais: Pouca catalase</text>

  <line x1="510" y1="146" x2="510" y2="162" stroke="#dc2626" stroke-width="1.5"/>
  <polygon points="510,166 505,159 515,159" fill="#dc2626"/>

  <rect x="385" y="168" width="250" height="24" rx="12" fill="#dc2626"/>
  <text x="510" y="184" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">H₂O₂ acumula → Dano oxidativo → MORTE</text>
</svg>
